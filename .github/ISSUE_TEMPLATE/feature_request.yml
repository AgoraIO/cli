name: Feature request
description: Suggest a new command, flag, output shape, or behavior
title: "[Feature] "
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement! Please describe the use case first
        — features that solve a concrete user problem are easier to evaluate
        than features described purely in terms of implementation.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow that is currently painful or impossible. Who is affected (human developers, CI scripts, agents)?
      placeholder: |
        Today I want to ___, but the CLI ___, so I have to ___.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: |
        What command, flag, output, or behavior should exist? If you can sketch the JSON envelope or pretty output, please include it.
      render: shell
      placeholder: |
        # Example proposal
        agora project export --json
        # → returns the full project state as a stable JSON shape suitable for
        #   diffing across environments.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered (existing commands, scripts, agent prompts) and why they are insufficient.
    validations:
      required: false

  - type: dropdown
    id: audience
    attributes:
      label: Primary audience
      multiple: true
      options:
        - Human developers (interactive CLI)
        - CI / automation scripts
        - AI coding agents (Cursor, Claude, Copilot, etc.)
        - SDK developers
    validations:
      required: true

  - type: dropdown
    id: breaking
    attributes:
      label: Breaking-change risk
      multiple: false
      options:
        - "No — purely additive (new command, new flag, new field)"
        - "Maybe — changes existing pretty/JSON output"
        - "Yes — changes a documented contract (exit code, error.code, JSON shape)"
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have read AGENTS.md and CONTRIBUTING.md and this proposal aligns with the CLI's design contracts (JSON envelope, exit codes, error code catalog).
          required: true
