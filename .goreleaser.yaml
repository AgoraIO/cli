version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: agora-cli
    binary: agora
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

# Preserve existing archive naming so install scripts (and future package managers)
# continue to work without changes.
archives:
  - id: agora-cli
    ids: [agora-cli]
    name_template: 'agora-cli-go_{{ .Tag }}_{{ .Os }}_{{ .Arch }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto
  make_latest: true

# Homebrew tap / Scoop bucket coming soon...
# Releases ship archives + checksums for install.sh / install.ps1.

# ---------------------------------------------------------------------------
# Linux packages (.deb, .rpm, .apk)
# These land in the GitHub release as artifacts.
# .deb files are also consumed by the apt-repo.yml workflow which publishes
# a signed apt repository to GitHub Pages.
# ---------------------------------------------------------------------------
nfpms:
  - id: linux-packages
    ids: [agora-cli]
    package_name: agora-cli
    vendor: Agora
    homepage: https://agora.io
    maintainer: Agora DevEx <devex@agora.io>
    description: |-
      Agora developer onboarding CLI.
      Manage authentication, remote projects, and quickstart workflows.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin

# ---------------------------------------------------------------------------
# Docker images → GitHub Container Registry (GHCR)
# Requires: packages: write permission in release.yml
# Images: ghcr.io/{owner}/agora-cli:{version} and :latest
# ---------------------------------------------------------------------------
dockers:
  - id: linux-amd64
    ids: [agora-cli]
    goarch: amd64
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      # Docker requires lowercase registry paths; GitHub org names may be mixed case.
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:{{ .Version }}-amd64'
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:latest-amd64'
    build_flag_templates:
      - '--platform=linux/amd64'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.created={{ .Date }}'
      - '--label=org.opencontainers.image.source={{ .GitURL }}'

  - id: linux-arm64
    ids: [agora-cli]
    goarch: arm64
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:{{ .Version }}-arm64'
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:latest-arm64'
    build_flag_templates:
      - '--platform=linux/arm64'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.created={{ .Date }}'
      - '--label=org.opencontainers.image.source={{ .GitURL }}'

docker_manifests:
  - name_template: 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:{{ .Version }}'
    image_templates:
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:{{ .Version }}-amd64'
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:{{ .Version }}-arm64'
  - name_template: 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:latest'
    image_templates:
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:latest-amd64'
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:latest-arm64'
